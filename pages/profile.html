<!-- profile.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | Job>inder</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
    <header id="main-header"></header>
    
    <main>
        <div class="rating-container">
            <div class="profile-rating-header">
                <h1 style="text-align: center;">User Profile</h1>
                <div class="avg-score" id="avg-rating">0.0</div>
                <div id="total-reviews" style="text-align: center;">0 reviews</div>
                
                <!-- Logout Button integrated into profile page -->
                <div style="margin-top: 20px; text-align: center;">
                    <a href="#" id="logout-btn" title="Logout" style="display: inline-flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; color: var(--primary-color); font-weight: 600; padding: 8px 16px; border: 2px solid var(--primary-color); border-radius: 20px; transition: background 0.2s;">
                        <img src="https://cdn-icons-png.freepik.com/512/15080/15080136.png" alt="Logout" style="width: 18px; height: 18px;">
                        <span>Logout</span>
                    </a>
                </div>
            </div>
            <div id="reviews-list">
                <!-- Reviews will be injected here -->
            </div>
        </div>
    </main>

    <footer id="main-footer"></footer>

    <script type="module">
        import { getUserRatings } from '/assets/js/rating.js';
        import { loadHeader, loadFooter } from '/assets/js/layout.js';
        import { auth } from '/assets/js/firebase-config.js';

        loadHeader();
        loadFooter();

        const targetUserId = "userA"; // Mock target user

        async function loadProfile() {
            try {
                const data = await getUserRatings(targetUserId);
                document.getElementById('avg-rating').innerText = data.average + " ★";
                document.getElementById('total-reviews').innerText = `${data.totalReviews} reviews`;
                
                const list = document.getElementById('reviews-list');
                list.innerHTML = data.reviews.map(r => `
                    <div class="review-card">
                        <strong style="color: var(--primary-color);">Rating: ${r.rating} ★</strong>
                        <p>${r.comment}</p>
                        <small>Job ID: ${r.jobId}</small>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Failed to load ratings", err);
            }
        }

        document.getElementById('logout-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            try {
                await auth.signOut();
                alert("Logged out successfully!");
                window.location.href = "/index.html";
            } catch (err) {
                alert("Error during logout: " + err.message);
            }
        });

        loadProfile();
    </script>
</body>
</html>
