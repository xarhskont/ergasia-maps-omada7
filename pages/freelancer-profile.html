<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelancer Profile | FreelanceHub</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
    <header id="main-header"></header>
    
    <main class="profile-container">
        <div class="profile-card" id="profile-card">
            <h1 id="profile-title">My Profile</h1>
            
            <!-- View Mode: For Employers/Other Users -->
            <div id="view-mode" style="display: none;">
                <div class="profile-info-section">
                    <div class="form-group">
                        <label>Full Name</label>
                        <p id="view-name" class="view-value"></p>
                    </div>
                    <div class="form-group">
                        <label>Professional Bio</label>
                        <p id="view-bio" class="view-value"></p>
                    </div>
                    <div class="form-group">
                        <label>Skills</label>
                        <p id="view-skills" class="view-value"></p>
                    </div>
                    <div class="form-group">
                        <label>Portfolio</label>
                        <p id="view-portfolio" class="view-value"></p>
                    </div>
                </div>
                <div style="margin-top: 20px; text-align: center;">
                    <button id="back-btn" class="btn-save">Back to Applications</button>
                </div>
            </div>

            <!-- Edit Mode: For the Profile Owner -->
            <form id="profile-form" style="display: none;">
                <div class="form-group">
                    <label for="display-name">Full Name</label>
                    <input type="text" id="display-name" name="displayName" required>
                </div>
                <div class="form-group">
                    <label for="bio">Professional Bio</label>
                    <textarea id="bio" name="bio" rows="4" placeholder="Tell us about your experience..."></textarea>
                </div>
                <div class="form-group">
                    <label for="skills">Skills (Comma separated)</label>
                    <input type="text" id="skills" name="skills" placeholder="e.g. JavaScript, React, Python">
                </div>
                <div class="form-group">
                    <label for="portfolio">Portfolio Link</label>
                    <input type="url" id="portfolio" name="portfolio" placeholder="https://...">
                </div>
                <button type="submit" class="btn-save">Save Changes</button>
            </form>

        </div>

        <div class="stats-container">
            <h3>Reputation</h3>
            <div id="rating-summary">
                <span id="avg-rating">0.0</span> ★ 
                <span id="total-reviews">(0 reviews)</span>
            </div>
            <div id="reviews-list">
                </div>
        </div>
    </main>

    <footer id="main-footer"></footer>

    <script type="module">
        import { auth, db } from '/assets/js/firebase-config.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        import { loadHeader, loadFooter } from '/assets/js/layout.js';
        import { getUserRatings } from '/assets/js/rating.js';

        loadHeader();
        loadFooter();

        const profileForm = document.getElementById('profile-form');
        const viewModeDiv = document.getElementById('view-mode');
        const profileTitle = document.getElementById('profile-title');
        
        // Get ID from URL
        const params = new URLSearchParams(window.location.search);
        const profileId = params.get('id');

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                 window.location.href = '/login.html';
            } else {
                // If no profileId in URL, assume the user is viewing their own profile
                const targetId = profileId || user.uid;
                loadFreelancerData(targetId, user.uid);
            }
        });

        async function loadFreelancerData(targetId, currentUserId) {
            try {
                const userDoc = await getDoc(doc(db, "users", targetId));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    
                    // Check if this is the owner or a viewer
                    if (targetId === currentUserId) {
                        // EDIT MODE
                        profileTitle.innerText = 'My Profile';
                        viewModeDiv.style.display = 'none';
                        profileForm.style.display = 'block';
                        
                        document.getElementById('display-name').value = data.fullName || ''; 
                        document.getElementById('bio').value = data.bio || '';
                        document.getElementById('skills').value = (data.skills || []).join(', ');
                        document.getElementById('portfolio').value = data.portfolio || '';
                    } else {
                        // VIEW MODE
                        profileTitle.innerText = 'Freelancer Profile';
                        viewModeDiv.style.display = 'block';
                        profileForm.style.display = 'none';
                        
                        document.getElementById('view-name').innerText = data.fullName || 'N/A';
                        document.getElementById('view-bio').innerText = data.bio || 'No bio provided.';
                        document.getElementById('view-skills').innerText = (data.skills || []).join(', ') || 'None';
                        document.getElementById('view-portfolio').innerText = data.portfolio || 'No portfolio linked';
                    }
                }
            } catch (err) {
                console.error("Error loading profile:", err);
            }

            try {
                const ratings = await getUserRatings(targetId);
                document.getElementById('avg-rating').innerText = ratings.average;
                document.getElementById('total-reviews').innerText = `(${ratings.totalReviews} reviews)`;
                document.getElementById('reviews-list').innerHTML = ratings.reviews.map(r => `
                    <div class="review-card">
                        <strong>${r.rating} ★</strong>
                        <p>${r.comment}</p>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Error loading reviews:", err);
            }
        }

        // Back Button Logic
        document.getElementById('back-btn')?.addEventListener('click', () => {
            const referrer = document.referrer;
            if (referrer && referrer.includes('job-applications.html')) {
                window.location.href = referrer;
            } else {
                window.location.href = '/pages/employer-dashboard.html';
            }
        });

        profileForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = auth.currentUser;
            if (!user) return;

            const updatedData = {
                fullName: document.getElementById('display-name').value, 
                bio: document.getElementById('bio').value,
                skills: document.getElementById('skills').value.split(',').map(s => s.trim()),
                portfolio: document.getElementById('portfolio').value,
                updatedAt: new Date()
            };

            try {
                await updateDoc(doc(db, "users", user.uid), updatedData);
                alert("Profile updated successfully!");
            } catch (err) {
                alert("Error updating profile: " + err.message);
            }
        });
    </script>
</body>
</html>
