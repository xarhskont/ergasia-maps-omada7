<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Post a Job | Job>inder</title>
        <link rel="stylesheet" href="/assets/css/styles.css" />
    </head>
    <body style="display: flex; flex-direction: column; min-height: 100vh">
        <header id="main-header"></header>
        <main style="display: flex; align-items: center; justify-content: center; flex: 1">
            <div class="rating-container">
                <h2 style="text-align: center; color: var(--primary-color)">Post a New Job</h2>
                <form id="create-job-form">
                    <div class="form-group">
                        <label for="jobTitle">Job Title</label>
                        <input
                            type="text"
                            id="jobTitle"
                            placeholder="e.g. Full Stack Developer"
                            required
                        />
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="">Select Category</option>
                            <option value="Web Development">Web Development</option>
                            <option value="Graphic Design">Graphic Design</option>
                            <option value="Writing">Writing</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="jobDescription">Project Description</label>
                        <textarea
                            id="jobDescription"
                            rows="5"
                            placeholder="Describe the requirements, deliverables, and goals..."
                            required
                        ></textarea>
                    </div>
                    <div class="form-group">
                        <label for="budget">Budget ($)</label>
                        <input type="number" id="budget" placeholder="e.g. 500" required />
                    </div>
                    <div class="form-group">
                        <label for="deadline">Deadline</label>
                        <input type="date" id="deadline" required />
                    </div>
                    <button type="submit" class="btn-submit">Post Job</button>
                </form>
            </div>
        </main>
        <footer id="main-footer"></footer>
        <script type="module" src="/assets/js/create-job.js"></script>
        <script type="module" src="/assets/js/layout.js"></script>
    </body>
</html>
