<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Jobs | FreelanceHub</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
    <header id="main-header"></header>
    
    <main class="my-jobs-container">
        <h1>My Jobs</h1>
        
        <div class="jobs-status-tabs">
            <button class="tab-btn active" data-status="all">All</button>
            <button class="tab-btn" data-status="pending">Pending</button>
            <button class="tab-btn" data-status="assigned">Assigned</button>
            <button class="tab-btn" data-status="submitted">Submitted</button>
        </div>

        <div id="jobs-list" class="jobs-tracker-grid"></div>
    </main>

    <footer id="main-footer"></footer>

    <script type="module">
        import { auth, db } from '/assets/js/firebase-config.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';
        import { collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        import { loadHeader, loadFooter } from '/assets/js/layout.js';

        loadHeader();
        loadFooter();

        const jobsList = document.getElementById('jobs-list');
        let currentFilter = 'all';

        onAuthStateChanged(auth, (user) => {
            if (user) {
                fetchMyJobs(user);
            } else {
                 window.location.href = '/login.html';
            }
        });

        async function fetchMyJobs(user) {
            try {
                const q = query(collection(db, "applications"), where("freelancerId", "==", user.uid));
                const querySnapshot = await getDocs(q);
                
                const applications = [];
                for (const appDoc of querySnapshot.docs) {
                    const appData = appDoc.data();
                    let jobTitle = `Job ID: ${appData.jobId}`; // Αν δε βρει τίτλο, δείχνει το ID
                    let jobBudget = 'N/A';
                    let jobDeadline = 'N/A';
                    let jobDescription = 'No description available.';
                    
                    // Παίρνουμε τον πραγματικό τίτλο της δουλειάς
                    try {
                        const jobRef = await getDoc(doc(db, "jobs", appData.jobId));
                        if (jobRef.exists()) {
                            const jobData = jobRef.data();
                            jobTitle = jobData.title || jobTitle;
                            jobBudget = jobData.budget ? `$${jobData.budget}` : 'N/A';
                            jobDescription = jobData.description || jobDescription;
                            
                            if (jobData.deadline) {
                                jobDeadline = typeof jobData.deadline.toDate === 'function' 
                                    ? jobData.deadline.toDate().toLocaleDateString() 
                                    : jobData.deadline;
                            }
                        }
                    } catch (e) {
                        console.error("Error fetching job title:", e);
                    }

                    applications.push({ 
                        id: appDoc.id, 
                        jobTitle, 
                        jobBudget, 
                        jobDeadline, 
                        jobDescription, 
                        ...appData 
                    });
                }

                const filtered = currentFilter === 'all' 
                    ? applications 
                    : applications.filter(app => app.status === currentFilter);

                renderJobs(filtered);
            } catch (err) {
                console.error("Error fetching applications:", err);
            }
        }

        function renderJobs(apps) {
            if (apps.length === 0) {
                jobsList.innerHTML = `<p class="empty-msg">No jobs found for this category.</p>`;
                return;
            }

            jobsList.innerHTML = apps.map(app => `
                <div class="tracker-card">
                    <div class="tracker-header" style="margin-bottom: 10px;">
                        <strong style="font-size: 1.1rem; color: var(--primary-color);">${app.jobTitle}</strong>
                        <span class="status-badge ${app.status}">${app.status}</span>
                    </div>
                    
                    <div style="display: flex; gap: 15px; margin-bottom: 12px; font-size: 0.85rem; color: #64748b; background: #f8fafc; padding: 8px; border-radius: 6px; border: 1px solid #e2e8f0;">
                        <span><strong>Budget:</strong> ${app.jobBudget}</span>
                        <span><strong>Due:</strong> ${app.jobDeadline}</span>
                    </div>

                    <p style="color: #475569; font-size: 0.9rem; margin-bottom: 10px;">
                        <strong>Job Details:</strong> ${app.jobDescription.substring(0, 80)}...
                    </p>

                    <p style="color: var(--secondary-color); font-size: 0.9rem; margin-bottom: 15px; border-left: 3px solid #cbd5e1; padding-left: 10px;">
                        <strong>Your Proposal:</strong> ${app.proposal.substring(0, 60)}...
                    </p>
                    
                     ${app.status === 'assigned' ? `<a href="/pages/submit-work?jobId=${app.jobId}" class="btn-submit-work" style="display: block; text-align: center; margin-top: 10px;">Submit Deliverable</a>` : ''}
                </div>
            `).join('');
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.dataset.status;
                
                if (auth.currentUser) {
                    fetchMyJobs(auth.currentUser);
                }
            });
        });
    </script>
</body>
</html>
