<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employer Dashboard | Job>inder</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">
    <header id="main-header"></header>
    <main class="my-jobs-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div>
                <h1>Employer Dashboard</h1>
                <p id="employer-welcome" style="color: var(--secondary-color); font-size: 1.1rem; margin-top: 5px;">Loading profile...</p>
            </div>
        </div>

        <div class="jobs-status-tabs" id="status-filters">
            <button class="tab-btn active" data-status="all">All Jobs</button>
            <button class="tab-btn" data-status="open">Open</button>
            <button class="tab-btn" data-status="assigned">Assigned</button>
        </div>

        <div class="jobs-tracker-grid" id="jobs-grid">
            <!-- Jobs will be injected here -->
        </div>
        <a href="/pages/create-job.html" class="fab-post-job" title="Post New Job">+</a>
    </main>
    <footer id="main-footer"></footer>
    <script type="module" src="/assets/js/employer-dashboard.js"></script>
    <script type="module" src="/assets/js/layout.js"></script>
</body>
</html>
